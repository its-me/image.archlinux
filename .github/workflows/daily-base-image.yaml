name: Daily base image

on:
  schedule:
    - cron: "30 9 * * *"

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: arch-linux

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm arch-linux pacman -Q | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/${{ github.repository }}:$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker tag arch-linux ghcr.io/${{ github.repository }}:${{ steps.exist.outputs.hash }}
            docker tag arch-linux ghcr.io/${{ github.repository }}:latest
            docker push ghcr.io/${{ github.repository }}:${{ steps.exist.outputs.hash }}
            docker push ghcr.io/${{ github.repository }}:latest
          fi
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:$date_tag \
            ghcr.io/${{ github.repository }}:latest

  push-hub:
    name: Publish to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: archlinux
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build.outputs.hash }} \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:latest \
              ghcr.io/${{ github.repository }}:${{ needs.build.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$date_tag \
            ghcr.io/${{ github.repository }}:latest

  push-quay:
    name: Publish to Quay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: archlinux
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if image exists in Quay
        id: exist
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build.outputs.hash }} \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:latest \
              ghcr.io/${{ github.repository }}:${{ needs.build.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$date_tag \
            ghcr.io/${{ github.repository }}:latest
