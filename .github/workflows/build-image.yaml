name: Build image

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.cache.outputs.hash }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: arch-linux

      - name: Check image cache
        id: cache
        run: |
          hash=$(docker run --rm arch-linux pacman -Q | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/${{ github.repository }}:$hash > /dev/null 2>&1; then
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        if: steps.cache.outputs.hit != 'true'
        run: |
          date_tag=$(date -u +%y%m%d)
          docker tag arch-linux ghcr.io/${{ github.repository }}:${{ steps.cache.outputs.hash }}
          docker tag arch-linux ghcr.io/${{ github.repository }}:$date_tag
          docker tag arch-linux ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ steps.cache.outputs.hash }}
          docker push ghcr.io/${{ github.repository }}:$date_tag
          docker push ghcr.io/${{ github.repository }}:latest

  push-hub:
    name: Push to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check image cache
        id: cache
        run: |
          if docker manifest inspect ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ needs.build.outputs.hash }} > /dev/null 2>&1; then
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to Docker Hub
        if: steps.cache.outputs.hit != 'true'
        run: |
          date_tag=$(date -u +%y%m%d)
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ needs.build.outputs.hash }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:$date_tag \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest \
            ghcr.io/${{ github.repository }}:${{ needs.build.outputs.hash }}

  push-quay:
    name: Push to Quay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check image cache
        id: cache
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:${{ needs.build.outputs.hash }} > /dev/null 2>&1; then
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to Quay
        if: steps.cache.outputs.hit != 'true'
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          date_tag=$(date -u +%y%m%d)
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:${{ needs.build.outputs.hash }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:$date_tag \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/${{ github.event.repository.name }}:latest \
            ghcr.io/${{ github.repository }}:${{ needs.build.outputs.hash }}
